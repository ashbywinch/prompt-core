name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install instructor openai pydantic pytest pytest-cov
    
    - name: Run unit tests
      run: |
        python test_conversation.py
    
    - name: Run test coverage
      run: |
        python -m pytest tests/unit/ --cov=prompt_core --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Check for integration tests
      run: |
        if [ -d "tests/integration" ]; then
          echo "Integration tests directory exists"
          echo "To run integration tests, set OPENAI_API_KEY in GitHub Secrets"
          echo "and use 'make test-integration' locally"
        fi

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install linting tools
      run: |
        pip install black flake8
    
    - name: Check code formatting
      run: |
        black --check prompt_core/ tests/
    
    - name: Lint code
      run: |
        flake8 prompt_core/ tests/ --max-line-length=88