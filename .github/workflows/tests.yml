name: CI

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup and install dependencies
        run: make setup
      
      - name: Lint
        run: make lint
      
      - name: Unit tests
        run: make test
      
      - name: Evaluation tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: make evals
